apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiseries-api-channel-credentials
  labels:
    app: apiseries-api-channel-credentials
spec:
  replicas: 1  # Número de copias del pod
  selector:
    matchLabels:
      app: apiseries-api-channel-credentials
  template:
    metadata:
      labels:
        app: apiseries-api-channel-credentials
    spec:
      containers:
      - name: apiseries-api-channel-credentials
        image: apiseries-api-channel-credentials  # Debe coincidir con tu imagen local
        imagePullPolicy: IfNotPresent  # Importante: No intenta bajar de internet si ya está local
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # Opcional: Health checks
        livenessProbe:
          httpGet:
            path: /apis/nodes/channel-credentials/healthcheck/health  # Cambia a tu endpoint de salud
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10