apiVersion: v1
kind: Service
metadata:
  name: apiseries-api-channel-credentials
spec:
  selector:
    app: apiseries-api-channel-credentials
  ports:
    - protocol: TCP
      port: 80       # Puerto expuesto por el servicio
      targetPort: 8000 # Puerto del contenedor
  type: LoadBalancer   # Docker Desktop soporta LoadBalancer localmente