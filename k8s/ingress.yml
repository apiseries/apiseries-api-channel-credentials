apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apiseries-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /\$1
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: apiseries-api-token
            port:
              number: 8000